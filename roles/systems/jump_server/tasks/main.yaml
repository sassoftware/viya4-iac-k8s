---
- name: Set owner and group (Debian/Ubuntu)
  ansible.builtin.set_fact:
    owner: nobody
    group: nogroup
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Set owner and group (RHEL/Rocky)
  ansible.builtin.set_fact:
    owner: nobody
    group: nobody
  when: ansible_os_family == "RedHat"
  tags:
    - install
    - update

# nfs-common (Debian) / nfs-utils (RHEL) — nfs-utils was already installed by systems/common on Rocky
- name: Install nfs-common package (Debian/Ubuntu)
  ansible.builtin.package:
    name: nfs-common
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Create mount point /viya-share
  ansible.builtin.file:
    dest: /viya-share
    state: directory
    owner: "{{ owner }}"
    group: "{{ group }}"
    mode: "0777"
  tags:
    - install
    - update

- name: Create mount point /pvs for viya4-deployment compatibility
  ansible.builtin.file:
    dest: /pvs
    state: directory
    owner: "{{ owner }}"
    group: "{{ group }}"
    mode: "0777"
  tags:
    - install
    - update

- name: Create mount point /srv/nfs/kubernetes/sc/default
  ansible.builtin.file:
    dest: /srv/nfs/kubernetes/sc/default
    state: directory
    owner: "{{ owner }}"
    group: "{{ group }}"
    mode: "0777"
  tags:
    - install
    - update

- name: Test for fstab entry
  ansible.builtin.shell: grep -c "{{ nfs_ip }}" /etc/fstab || true
  register: fstab_file_rc
  tags:
    - install
    - update

- name: Add entry to /etc/fstab - new entry
  ansible.builtin.lineinfile:
    path: /etc/fstab
    line: "{{ item }}"
  when: fstab_file_rc.stdout == "0"
  with_items:
    - "{{ nfs_ip }}:/export    /viya-share    nfs auto,nofail,noatime,nolock,intr,tcp,actimeo=1800 0 0"
    - "{{ nfs_ip }}:/pvs    /pvs    nfs auto,nofail,noatime,nolock,intr,tcp,actimeo=1800 0 0"
    - "{{ nfs_ip }}:/srv/nfs/kubernetes/sc/default    /srv/nfs/kubernetes/sc/default    nfs auto,nofail,noatime,nolock,intr,tcp,actimeo=1800 0 0"
  tags:
    - install
    - update

- name: Mount /viya-share # noqa: command-instead-of-module
  ansible.builtin.command: mount -a
  tags:
    - install
    - update

- name: Create directory for sas storage class
  ansible.builtin.file:
    path: /viya-share/pvs
    owner: "{{ owner }}"
    group: "{{ group }}"
    mode: "0777"
    state: directory
  tags:
    - install
    - update
