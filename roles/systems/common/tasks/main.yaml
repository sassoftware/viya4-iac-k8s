---
# Supported operating systems:
#   - Ubuntu 22.04 LTS / 24.04 LTS
#   - Rocky Linux 9 / RHEL 9

# SSH keys assign to the 'root' user on your systems
- name: Add ssh keys - root user
  ansible.posix.authorized_key:
    user: root
    key: "{{ lookup('file', '{{item}}') }}"
    state: present
  with_fileglob: "{{ system_ssh_keys_dir }}/*.pub"
  tags:
    - install
    - update

# SSH keys assign to the 'OS' user on your systems
- name: Add ssh keys - OS user
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ lookup('file', '{{item}}') }}"
    state: present
  with_fileglob: "{{ system_ssh_keys_dir }}/*.pub"
  tags:
    - install
    - update

# ---- Ubuntu-only: unattended-upgrades cleanup --------------------------------

- name: Disable and turn off unattended-upgrades
  ansible.builtin.systemd:
    name: unattended-upgrades.service
    enabled: false
    state: stopped
  ignore_errors: true
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Kill the unattended-upgrade task if it's running
  ansible.builtin.shell: |
    if pgrep -x unattended-upgrade >/dev/null; then
      killall -q -9 unattended-upgrade
    fi
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Uninstalling unattended-upgrades
  ansible.builtin.apt:
    name: unattended-upgrades
    state: absent
    purge: true
  register: apt_remove_result
  until: apt_remove_result is succeeded
  retries: 5
  delay: 30
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

# ---- RHEL/Rocky: disable firewalld and set SELinux to permissive ------------

- name: Disable firewalld (RHEL/Rocky)
  ansible.builtin.systemd:
    name: firewalld
    enabled: false
    state: stopped
  ignore_errors: true
  when: ansible_os_family == "RedHat"
  tags:
    - install

- name: Set SELinux to permissive (RHEL/Rocky)
  ansible.builtin.shell: |
    /usr/sbin/setenforce 0 || true
    /usr/bin/sed -i 's/^SELINUX=enforcing$/SELINUX=permissive/' /etc/selinux/config
  when: ansible_os_family == "RedHat"
  tags:
    - install

# ---- OS Update ---------------------------------------------------------------

- name: Update OS (Debian/Ubuntu)
  ansible.builtin.apt:
    name: '*'
    state: latest
    update_cache: true
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Update OS (RHEL/Rocky)
  ansible.builtin.dnf:
    name: '*'
    state: latest
    update_cache: true
    allowerasing: true  # resolves python3/python-unversioned-command depsolve conflicts on Rocky 9
  when: ansible_os_family == "RedHat"
  tags:
    - install
    - update

# ---- Python and NFS packages -------------------------------------------------

- name: Install Python and PIP packages (Debian/Ubuntu)
  ansible.builtin.package:
    name: "{{ item }}"
    state: latest
  with_items:
    - python3
    - python3-dev
    - python3-pip
    - nfs-common
  when: ansible_os_family == "Debian"
  retries: 3
  delay: 3
  tags:
    - install
    - update

- name: Install Python and NFS packages (RHEL/Rocky)
  ansible.builtin.package:
    name: "{{ item }}"
    state: latest
  with_items:
    - python3
    - python3-devel
    - python3-pip
    - nfs-utils
  when: ansible_os_family == "RedHat"
  retries: 3
  delay: 3
  tags:
    - install
    - update

- name: Update alternatives for Python and PIP
  ansible.builtin.shell: |
    update-alternatives --install /usr/bin/python python /usr/bin/python3 1
    update-alternatives --install /usr/bin/pip pip /usr/bin/pip3 1
  tags:
    - install
    - update

- name: Turn off swap
  ansible.builtin.shell: |
    swapoff -a
    sed -i '/swap/d' /etc/fstab
  tags:
    - install
    - update
