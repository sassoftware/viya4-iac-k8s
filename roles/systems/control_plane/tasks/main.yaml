---
# Install NFS client utilities required for NFS volume mounting
# nfs-utils already installed on RHEL by systems/common
- name: Install NFS client utilities (Debian/Ubuntu)
  ansible.builtin.package:
    name: nfs-common
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Generate control plane shared ssh key pair
  ansible.builtin.command: "{{ item }}"
  with_items:
    - rm -rf ~/.ssh/{{ control_plane_ssh_key_name }}
    - ssh-keygen -t rsa -q -N '' -b 4096 -f ~/.ssh/{{ control_plane_ssh_key_name }}
  tags:
    - install
    - update

- name: Get the ssh key file content
  ansible.builtin.command:
    cat ~/.ssh/{{ control_plane_ssh_key_name }}.pub
  register: ssh_key
  tags:
    - install
    - update

# Copy over public keys to enable file transfers between control plane nodes on your systems
- name: Add ssh keys for control plane nodes
  ansible.posix.authorized_key:
    user: root
    key: "{{ ssh_key.stdout }}"
    state: present
  tags:
    - install
    - update

# The ansible.posix.synchronize PKI copy task in kubernetes/control_plane/init/secondary
# runs rsync delegated to the primary CP node, using ansible_ssh_private_key_file as the
# SSH identity. That key must exist on the CP VM itself (not just in the Ansible controller).
- name: Ensure SSH keys directory exists on control plane nodes
  ansible.builtin.file:
    path: "{{ ansible_ssh_private_key_file | dirname }}"
    state: directory
    mode: "0700"
    owner: root
    group: root
  when: ansible_ssh_private_key_file is defined and ansible_ssh_private_key_file | length > 0
  tags:
    - install
    - update

- name: Copy Ansible SSH private key to control plane nodes
  ansible.builtin.copy:
    src: "{{ ansible_ssh_private_key_file }}"
    dest: "{{ ansible_ssh_private_key_file }}"
    mode: "0600"
    owner: root
    group: root
  when: ansible_ssh_private_key_file is defined and ansible_ssh_private_key_file | length > 0
  tags:
    - install
    - update
