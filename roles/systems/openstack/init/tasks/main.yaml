---
# OpenStack VMs use Rocky Linux / RHEL-family images with virtio block devices.
# This role handles OS-level init tasks appropriate for that environment.

# ---- OS version check ------------------------------------------------------
# Kubernetes 1.35 drops cgroup v1 support. Only OSes that ship with cgroup v2
# enabled by default are supported:
#   Ubuntu  : 22.04 (Jammy) and 24.04 (Noble)
#   Rocky / RHEL : 9.x
# Ubuntu 20.04, Rocky/RHEL 8, and older distros use cgroup v1 by default
# and are NOT supported with Kubernetes >= 1.35.
- name: Verify OS supports cgroup v2 (required for Kubernetes 1.35+)
  ansible.builtin.assert:
    that:
      - >
        (ansible_distribution == "Ubuntu" and
         ansible_distribution_version in ["22.04", "24.04"])
        or
        (ansible_os_family == "RedHat" and
         ansible_distribution_major_version | int >= 9)
    fail_msg: >
      Unsupported OS: {{ ansible_distribution }} {{ ansible_distribution_version }}.
      Kubernetes 1.35+ requires cgroup v2. Supported OSes: Ubuntu 22.04/24.04,
      Rocky Linux 9 / RHEL 9 or later.
    success_msg: "OS cgroup v2 check passed: {{ ansible_distribution }} {{ ansible_distribution_version }}"
  tags:
    - install
    - update

- name: Set owner and group for RHEL/Rocky Linux OS
  ansible.builtin.set_fact:
    owner: nobody
    group: nobody
  when: ansible_os_family == "RedHat"
  tags:
    - install
    - update

- name: Set owner and group for Ubuntu OS
  ansible.builtin.set_fact:
    owner: nobody
    group: nogroup
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Create /mnt/sas/volumes directory
  ansible.builtin.file:
    path: /mnt/sas/volumes
    state: directory
    owner: "{{ owner }}"
    group: "{{ group }}"
    mode: "0777"
  ignore_errors: true
  tags:
    - install
    - update

#
# Create local-static-provisioner symlinks for unpartitioned data disks
#

- name: Copy link creation script
  ansible.builtin.copy:
    src: ./files/link_devs.sh
    dest: /tmp/link_devs.sh
    owner: root
    group: root
    mode: "0700"
  tags:
    - install

- name: Run link creation script
  ansible.builtin.shell: |
    /tmp/link_devs.sh
  tags:
    - install
