---
# Task to remove all containerd artifacts
- name: Remove all containerd container, volumes, networks
  command: crictl system prune -af --volumes
  ignore_errors: true
  tags:
    - uninstall

# Task to Remove existing containerd installations
- name: Uninstall old Docker/Containerd versions
  ansible.builtin.package:
    name: "{{ packages }}"
    state: absent
  vars:
    packages:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - containerd.io
      - runc
  retries: 5
  delay: 3
  ignore_errors: true
  tags:
    - install

# ---- Kernel module setup (all distros) ------------------------------------

- name: Add module load file for containerd
  ansible.builtin.copy:
    dest: "/etc/modules-load.d/containerd.conf"
    content: |
      overlay
      br_netfilter
  tags:
    - install
    - update

- name: Add modules to running system for containerd
  ansible.builtin.shell: |
    modprobe overlay
    modprobe br_netfilter
  tags:
    - install
    - update

# NOTE: Added net.ipv4.conf.all.rp_filter for Calico CNI
- name: IP Table - File Update
  ansible.builtin.copy:
    dest: "/etc/sysctl.d/99-kubernetes-cri.conf"
    content: |
      net.bridge.bridge-nf-call-ip6tables = 1
      net.bridge.bridge-nf-call-iptables  = 1
      net.ipv4.ip_forward                 = 1
      net.ipv4.conf.all.rp_filter         = 1
  tags:
    - install
    - update

- name: IP Table - System Enable
  ansible.builtin.command: /sbin/sysctl --system
  tags:
    - install
    - update

# ===== Debian/Ubuntu: containerd via Docker APT repo ======================

- name: Install required packages for containerd (Debian/Ubuntu)
  ansible.builtin.package:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg2
      - lsb-release
      - software-properties-common
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Install Docker GPG key (Debian/Ubuntu)
  ansible.builtin.apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    keyring: /usr/share/keyrings/docker-archive-keyring.gpg
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Add Docker apt repo for containerd.io (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: deb [arch=amd64 signed-by=/usr/share/keyrings/docker-archive-keyring.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable
    state: present
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Set containerd.io package debian revision if not specified
  set_fact:
    kubernetes_cri_deb_rev: "-*"
  when:
    - ansible_os_family == "Debian"
    - kubernetes_cri_version | regex_search("^(\\d+\\.)(\\d+\\.)(\\d+)$")
  tags:
    - install
    - update

- name: Install containerd.io (Debian/Ubuntu)
  ansible.builtin.package:
    name: "containerd.io{% if kubernetes_cri_version is defined and kubernetes_cri_version %}={{ kubernetes_cri_version }}{{ kubernetes_cri_deb_rev }}{% endif %}"
    state: present
    allow_downgrade: true
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

# ===== RHEL/Rocky: containerd via Docker DNF repo =========================

- name: Install required packages for containerd (RHEL/Rocky)
  ansible.builtin.package:
    name:
      - curl
      - ca-certificates
    state: present
  when: ansible_os_family == "RedHat"
  tags:
    - install
    - update

- name: Add Docker yum repo for containerd.io (RHEL/Rocky)
  ansible.builtin.copy:
    dest: /etc/yum.repos.d/docker-ce.repo
    mode: "0644"
    content: |
      [docker-ce-stable]
      name=Docker CE Stable - $basearch
      baseurl=https://download.docker.com/linux/centos/$releasever/$basearch/stable
      enabled=1
      gpgcheck=1
      gpgkey=https://download.docker.com/linux/centos/gpg
  when: ansible_os_family == "RedHat"
  tags:
    - install
    - update

- name: Install containerd.io (RHEL/Rocky)
  ansible.builtin.dnf:
    name: "containerd.io{% if kubernetes_cri_version is defined and kubernetes_cri_version %}-{{ kubernetes_cri_version }}{% endif %}"
    state: present
    disable_gpg_check: false
  when: ansible_os_family == "RedHat"
  tags:
    - install
    - update

# ===== Configure containerd (all distros) ==================================

- name: Create /etc/containerd directory
  ansible.builtin.file:
    path: /etc/containerd
    state: directory
    mode: "0755"
  tags:
    - install
    - update

- name: Create containerd configuration file
  ansible.builtin.shell: |
    containerd config default > /etc/containerd/config.toml
  tags:
    - install
    - update

- name: Update sandbox image to match Kubernetes 1.34+ (pause:3.10.1)
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: 'sandbox_image = "registry.k8s.io/pause:[^"]*"'
    line: '      sandbox_image = "registry.k8s.io/pause:3.10.1"'
  tags:
    - install
    - update

- name: Enable systemd cgroups for containerd
  ansible.builtin.lineinfile:
    path: /etc/containerd/config.toml
    regexp: '^(\s+)SystemdCgroup = false'
    line: '            SystemdCgroup = true'
    backrefs: false
  tags:
    - install
    - update

- name: Enabling and starting containerd to start now and on boot
  ansible.builtin.systemd:
    name: containerd.service
    enabled: true
    state: restarted
  tags:
    - install
    - update
