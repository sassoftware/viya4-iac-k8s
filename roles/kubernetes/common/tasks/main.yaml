---
# Supported: Ubuntu 22.04/24.04 and Rocky Linux 9 / RHEL 9

- name: Add ssh keys - root user
  ansible.posix.authorized_key:
    user: root
    key: "{{ lookup('file', '{{item}}') }}"
    state: present
  with_fileglob: "{{ system_ssh_keys_dir }}/*.pub"
  when:
    - deployment_type == "bare_metal"
  tags:
    - install
    - update

- name: Add ssh keys - OS user
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ lookup('file', '{{item}}') }}"
    state: present
  with_fileglob: "{{ system_ssh_keys_dir }}/*.pub"
  when:
    - deployment_type == "bare_metal"
  tags:
    - install
    - update

- name: Update OS (bare_metal only)
  ansible.builtin.package:
    name: '*'
    state: latest
    update_cache: true
  when:
    - deployment_type == "bare_metal"
  tags:
    - install
    - update

# ---- cgroup v2 -------------------------------------------------------------
# https://rootlesscontaine.rs/getting-started/common/cgroup2/#enabling-cgroup-v2

- name: Enable cgroup v2 (Debian/Ubuntu — update-grub)
  vars:
    option: systemd.unified_cgroup_hierarchy
    value: "1"
  when: ansible_os_family == "Debian"
  tags:
    - install
  block:
    - name: Retrieve contents of /etc/default/grub
      ansible.builtin.command: cat /etc/default/grub
      register: grub_content
      changed_when: false

    - name: Retrieve existing GRUB_CMDLINE_LINUX options, if any
      set_fact:
        grub_cmdline_original: "{{ grub_content.stdout | regex_search('^GRUB_CMDLINE_LINUX=\"([^\"]*)\"$', '\\1', multiline=True) }}"

    - name: Set {{ option }}={{ value }} if option previously disabled
      set_fact:
        grub_cmdline_updated: "{{ grub_cmdline_original.0 | default('') | replace(option + '=0', option + '=' + value) }}"

    - name: Adding {{ option }}={{ value }} if option not present
      set_fact:
        grub_cmdline_updated: '{{ (grub_cmdline_updated + " " + option + "=" + value) | trim }}'
      when: 'option not in grub_cmdline_updated'

    - name: Adding updated GRUB_CMDLINE_LINUX to /etc/default/grub file
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX='
        line: 'GRUB_CMDLINE_LINUX="{{ grub_cmdline_updated }}"'
        owner: root
        group: root
        mode: "0644"

    - name: Update GRUB (Debian)
      ansible.builtin.command: update-grub

- name: Enable cgroup v2 (RHEL/Rocky — grub2-mkconfig)
  vars:
    option: systemd.unified_cgroup_hierarchy
    value: "1"
  when: ansible_os_family == "RedHat"
  tags:
    - install
  block:
    - name: Retrieve contents of /etc/default/grub
      ansible.builtin.command: cat /etc/default/grub
      register: grub_content
      changed_when: false

    - name: Retrieve existing GRUB_CMDLINE_LINUX options, if any
      set_fact:
        grub_cmdline_original: "{{ grub_content.stdout | regex_search('^GRUB_CMDLINE_LINUX=\"([^\"]*)\"$', '\\1', multiline=True) }}"

    - name: Set {{ option }}={{ value }} if option previously disabled
      set_fact:
        grub_cmdline_updated: "{{ grub_cmdline_original.0 | default('') | replace(option + '=0', option + '=' + value) }}"

    - name: Adding {{ option }}={{ value }} if option not present
      set_fact:
        grub_cmdline_updated: '{{ (grub_cmdline_updated + " " + option + "=" + value) | trim }}'
      when: 'option not in grub_cmdline_updated'

    - name: Adding updated GRUB_CMDLINE_LINUX to /etc/default/grub file
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: '^GRUB_CMDLINE_LINUX='
        line: 'GRUB_CMDLINE_LINUX="{{ grub_cmdline_updated }}"'
        owner: root
        group: root
        mode: "0644"

    - name: Update GRUB (RHEL/Rocky)
      ansible.builtin.shell: |
        if [ -d /sys/firmware/efi ]; then
          grub2-mkconfig -o /boot/efi/EFI/rocky/grub.cfg 2>/dev/null || \
          grub2-mkconfig -o /boot/efi/EFI/redhat/grub.cfg 2>/dev/null || true
        else
          grub2-mkconfig -o /boot/grub2/grub.cfg 2>/dev/null || true
        fi

# ---- CPU/memory cgroup delegation -----------------------------------------

- name: Enable CPU, CPUSET, and I/O delegation for non-root users
  tags:
    - install
    - update
  block:
    - name: Run mkdir for user@.service.d
      ansible.builtin.file:
        path: /etc/systemd/system/user@.service.d
        state: directory
        mode: '0755'
    - name: Adding delegation
      ansible.builtin.copy:
        dest: /etc/systemd/system/user@.service.d/delegate.conf
        content: |
          [Service]
          Delegate=cpu cpuset io memory pids

# ---- Common packages ------------------------------------------------------

- name: Install required packages for every machine
  ansible.builtin.package:
    name: "{{ packages }}"
    state: present
  vars:
    packages:
      - sshpass
      - conntrack
  tags:
    - install
    - update

- name: Install ipvsadm for IPVS load balancing support
  ansible.builtin.package:
    name: ipvsadm
    state: present
  tags:
    - install
    - update

- name: Add IPVS kernel module load file
  ansible.builtin.copy:
    dest: /etc/modules-load.d/ipvs.conf
    mode: "0644"
    content: |
      ip_vs
      ip_vs_rr
      ip_vs_wrr
      ip_vs_sh
      nf_conntrack
  tags:
    - install
    - update

- name: Load IPVS kernel modules
  ansible.builtin.shell: |
    modprobe ip_vs
    modprobe ip_vs_rr
    modprobe ip_vs_wrr
    modprobe ip_vs_sh
    modprobe nf_conntrack
  tags:
    - install
    - update

- name: Download helm installation script
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3
    dest: /tmp/get-helm-3
    validate_certs: false
    mode: "0755"
  tags:
    - install
    - update

- name: Execute helm installation script
  ansible.builtin.command: /tmp/get-helm-3 --version v{{ kubernetes_helm_version }} --no-sudo
  environment:
    PATH: "/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
  tags:
    - install
    - update

- name: Update limits to support SAS software
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    insertbefore: '^# End of file'
    line: "{{ item }}"
  with_items:
    - ''
    - '* soft     nproc          65535'
    - '* hard     nproc          65535'
    - '* soft     nofile         65535'
    - '* hard     nofile         65535'
    - 'root soft     nproc          65535'
    - 'root hard     nproc          65535'
    - 'root soft     nofile         65535'
    - 'root hard     nofile         65535'
    - ''
  tags:
    - install
    - update

- name: Allow all to bind to nfs mounts
  ansible.builtin.lineinfile:
    path: /etc/hosts.allow
    line: 'rpcbind : ALL'
    create: true
  tags:
    - install
    - update

- name: Add VIP FQDN to /etc/hosts (no DNS entry exists)
  ansible.builtin.lineinfile:
    path: /etc/hosts
    regexp: "{{ kubernetes_vip_fqdn }}"
    line: "{{ kubernetes_vip_ip }}  {{ kubernetes_vip_fqdn }}"
    state: present
  tags:
    - install
    - update

- name: Reboot machines to enable added items like cgroup for cri, etc.
  ansible.builtin.reboot:
  tags:
    - install
  when: inventory_hostname in groups["k8s"]
