---
- name: Get control plane IP from inventory
  ansible.builtin.shell: |
    grep -A1 '\[k8s_control_plane\]' {{ iac_inventory_dir }}/inventory | tail -1 | awk '{print $1}'
  register: cp_ip_output
  tags:
    - install
    - update
    - uninstall

- name: Set control plane host fact
  ansible.builtin.set_fact:
    cp_host: "{{ cp_ip_output.stdout }}"
  tags:
    - install
    - update
    - uninstall

- name: Write metrics-server helm values to temp file
  ansible.builtin.copy:
    content: "{{ kubernetes_METRICS_SERVER_CONFIG | to_nice_yaml }}"
    dest: "/tmp/metrics-server-values.yaml"
  tags:
    - install
    - update

- name: Copy helm values to control plane
  ansible.builtin.shell: >
    scp -o StrictHostKeyChecking=no
    -i {{ ansible_ssh_private_key_file }}
    /tmp/metrics-server-values.yaml
    {{ ansible_user }}@{{ cp_host }}:/tmp/metrics-server-values.yaml
  tags:
    - install
    - update

- name: Deploy metrics-server
  ansible.builtin.shell: >
    ssh -o StrictHostKeyChecking=no
    -i {{ ansible_ssh_private_key_file }}
    {{ ansible_user }}@{{ cp_host }}
    "sudo KUBECONFIG=/etc/kubernetes/admin.conf /usr/local/bin/helm upgrade --install
    {{ kubernetes_METRICS_SERVER_NAME }}
    {{ kubernetes_METRICS_SERVER_CHART_NAME }}
    --repo {{ kubernetes_METRICS_SERVER_CHART_URL }}
    --version {{ kubernetes_METRICS_SERVER_CHART_VERSION }}
    --namespace {{ kubernetes_METRICS_SERVER_NAMESPACE }}
    --create-namespace
    -f /tmp/metrics-server-values.yaml
    --wait"
  tags:
    - install
    - update

- name: Remove metrics-server
  ansible.builtin.shell: >
    ssh -o StrictHostKeyChecking=no
    -i {{ ansible_ssh_private_key_file }}
    {{ ansible_user }}@{{ cp_host }}
    "sudo KUBECONFIG=/etc/kubernetes/admin.conf /usr/local/bin/helm uninstall
    {{ kubernetes_METRICS_SERVER_NAME }}
    --namespace kube-system --wait || true"
  tags:
    - uninstall
