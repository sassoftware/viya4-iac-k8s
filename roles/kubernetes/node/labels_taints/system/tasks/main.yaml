---
- name: Label/Taints for System/Default node
  ansible.builtin.shell: |
    kubectl label nodes -l 'kubernetes.io/hostname in ({{ ansible_hostname }},{{ ansible_fqdn }})' kubernetes.azure.com/mode=system --overwrite
    kubectl label nodes -l 'kubernetes.io/hostname in ({{ ansible_hostname }},{{ ansible_fqdn }})' node-role.kubernetes.io/system-node= --overwrite
  delegate_to: "{{ groups['k8s_control_plane'][0] }}"
  tags:
    - install
    - update
