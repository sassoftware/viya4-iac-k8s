---
# Install NFS client utilities — nfs-utils already installed on RHEL by systems/common
- name: Install NFS client utilities (Debian/Ubuntu)
  ansible.builtin.package:
    name: nfs-common
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Set owner and group (Debian/Ubuntu)
  ansible.builtin.set_fact:
    owner: nobody
    group: nogroup
  when: ansible_os_family == "Debian"
  tags:
    - install
    - update

- name: Set owner and group (RHEL/Rocky)
  ansible.builtin.set_fact:
    owner: nobody
    group: nobody
  when: ansible_os_family == "RedHat"
  tags:
    - install
    - update

- name: Create /mnt/sas/volumes directory
  ansible.builtin.file:
    path: /mnt/sas/volumes
    state: directory
    owner: "{{ owner }}"
    group: "{{ group }}"
    mode: "0777"
  ignore_errors: true
  tags:
    - install
    - update
