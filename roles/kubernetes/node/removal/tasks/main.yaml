---
- name: Resolve registered Kubernetes node name
  ansible.builtin.shell: |
    kubectl get nodes -l 'kubernetes.io/hostname in ({{ ansible_hostname }},{{ ansible_fqdn }})' \
      -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true
  register: k8s_node_name
  delegate_to: "{{ groups['k8s_control_plane'][0] }}"
  ignore_errors: true
  tags:
    - uninstall

- name: Draining the node
  ansible.builtin.shell: |
    kubectl drain {{ k8s_node_name.stdout }} --delete-emptydir-data --force --ignore-daemonsets --timeout 60s
  delegate_to: "{{ groups['k8s_control_plane'][0] }}"
  when: k8s_node_name.stdout | length > 0
  ignore_errors: true
  tags:
    - uninstall

- name: Resetting the state
  ansible.builtin.shell: |
    kubeadm reset --force
  ignore_errors: true
  tags:
    - uninstall

- name: Remove CNI configuration
  ansible.builtin.file:
    state: absent
    path: /etc/cni/net.d
  tags:
    - uninstall

- name: Clean up IPTables
  ansible.builtin.shell: |
    iptables -F && iptables -t nat -F && iptables -t mangle -F && iptables -X
  ignore_errors: true
  tags:
    - uninstall

- name: Remove the node
  ansible.builtin.shell: |
    kubectl delete nodes {{ k8s_node_name.stdout }}
  delegate_to: "{{ groups['k8s_control_plane'][0] }}"
  when: k8s_node_name.stdout | length > 0
  ignore_errors: true
  tags:
    - uninstall
