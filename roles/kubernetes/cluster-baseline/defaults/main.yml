---
# =============================================================================
# Cluster Baseline - Default Variables
# =============================================================================
# These defaults are overridden by values in ansible-vars.yaml (generated by
# Terraform) or by --extra-vars on the ansible-playbook command line.
# =============================================================================

# -----------------------------------------------------------------------------
# Component Enablement Flags
# NOTE: BASELINE_ENABLE_CSI_NFS defaults to false because the kubernetes-install
#       playbook already deploys the NFS CSI driver via nfs-csi-driver role.
#       Set to true only if deploying cluster-baseline without running
#       kubernetes-install first.
# -----------------------------------------------------------------------------
BASELINE_ENABLE_INGRESS       : true
BASELINE_ENABLE_CERT_MANAGER  : true
BASELINE_ENABLE_CSI_NFS       : false
BASELINE_ENABLE_STORAGE_CLASS : true

# -----------------------------------------------------------------------------
# Split-Plane Topology
# -----------------------------------------------------------------------------
split_plane_topology : "co_located"

# Default SAS Viya namespace
NAMESPACE : "sas-viya"

# Tenant definitions (populated by Terraform for 'separated' topology)
TENANTS : {}

# -----------------------------------------------------------------------------
# Ingress / TLS
# -----------------------------------------------------------------------------
V4_CFG_INGRESS_TYPE    : "contour"
V4_CFG_INGRESS_MODE    : "public"
V4_CFG_TLS_GENERATOR   : "cert-manager"

# NFS filestore endpoint (populated from nfs_ip in ansible-vars.yaml)
V4_CFG_RWX_FILESTORE_ENDPOINT : ""
V4_CFG_RWX_FILESTORE_PATH     : "/export"

# -----------------------------------------------------------------------------
# Contour Ingress Controller (bitnami/contour)
# -----------------------------------------------------------------------------
CONTOUR_NAME          : "contour"
CONTOUR_NAMESPACE     : "projectcontour"
CONTOUR_CHART_NAME    : "contour"
CONTOUR_CHART_URL     : "https://charts.bitnami.com/bitnami"
CONTOUR_CHART_VERSION : "20.0.4"

CONTOUR_CONFIG :
  contour:
    replicaCount: 2
  envoy:
    kind: DaemonSet

# Annotations added to the Envoy Service when ingress mode is 'private'
CONTOUR_CONFIG_PRIVATE_LB :
  envoy:
    service:
      annotations: {}

# -----------------------------------------------------------------------------
# cert-manager (jetstack/cert-manager)
# -----------------------------------------------------------------------------
CERT_MANAGER_NAME          : "cert-manager"
CERT_MANAGER_NAMESPACE     : "cert-manager"
CERT_MANAGER_CHART_NAME    : "cert-manager"
CERT_MANAGER_CHART_URL     : "https://charts.jetstack.io"
CERT_MANAGER_CHART_VERSION : "1.17.2"

CERT_MANAGER_CONFIG :
  installCRDs: "true"
  global:
    leaderElection:
      namespace: cert-manager

# -----------------------------------------------------------------------------
# CSI NFS Driver (csi-driver-nfs)
# Used only when BASELINE_ENABLE_CSI_NFS: true
# -----------------------------------------------------------------------------
CSI_DRIVER_NFS_NAME          : "csi-driver-nfs-sas"
CSI_DRIVER_NFS_NAMESPACE     : "kube-system"
CSI_DRIVER_NFS_CHART_NAME    : "csi-driver-nfs"
CSI_DRIVER_NFS_CHART_URL     : "https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts"
CSI_DRIVER_NFS_CHART_VERSION : "4.11.0"

CSI_DRIVER_NFS_CONFIG :
  driver:
    mountPermissions: "0777"

# -----------------------------------------------------------------------------
# Storage Classes
# Created when BASELINE_ENABLE_STORAGE_CLASS: true
# -----------------------------------------------------------------------------

# Primary 'sas' StorageClass (RWX via NFS CSI driver)
STORAGE_CLASS_NAME                : "sas"
STORAGE_CLASS_PROVISIONER         : "nfs.csi.k8s.io"
STORAGE_CLASS_RECLAIM_POLICY      : "Delete"
STORAGE_CLASS_VOLUME_BINDING_MODE : "Immediate"
STORAGE_CLASS_IS_DEFAULT          : "false"

# 'sas-local-storage' StorageClass (RWO via local static provisioner)
LOCAL_STORAGE_CLASS_NAME                : "sas-local-storage"
LOCAL_STORAGE_CLASS_PROVISIONER         : "kubernetes.io/no-provisioner"
LOCAL_STORAGE_CLASS_RECLAIM_POLICY      : "Retain"
LOCAL_STORAGE_CLASS_VOLUME_BINDING_MODE : "WaitForFirstConsumer"
LOCAL_STORAGE_CLASS_IS_DEFAULT          : "false"
