---
#
# Cluster Baseline Playbook
#
# Deploys essential Kubernetes cluster components needed before a SAS Viya
# installation can proceed.  This playbook must be run after the Kubernetes
# cluster is fully operational (i.e. after the 'install' action in oss-k8s.sh).
#
# Components installed (controlled by BASELINE_ENABLE_* flags in ansible-vars.yaml):
#   - Contour ingress controller          (BASELINE_ENABLE_INGRESS)
#   - cert-manager TLS certificate manager (BASELINE_ENABLE_CERT_MANAGER)
#   - CSI NFS Driver                       (BASELINE_ENABLE_CSI_NFS)
#   - StorageClass resources               (BASELINE_ENABLE_STORAGE_CLASS)
#   - Kubernetes namespaces (split-plane)  (always – driven by split_plane_topology)
#
# Additionally creates Kubernetes namespace(s) for the SAS Viya deployment:
#   - co_located : single namespace (viya_namespace / NAMESPACE)
#   - separated  : shared Control+App namespace + isolated Data Plane namespace
#                  per tenant entry in TENANTS map
#
# Usage (via oss-k8s.sh):
#   ./oss-k8s.sh cluster-baseline
#   ./oss-k8s.sh apply setup install cluster-baseline
#
# Usage (direct ansible-playbook):
#   ansible-playbook \
#     --extra-vars "iac_inventory_dir=<workdir>" \
#     --extra-vars "@ansible-vars.yaml" \
#     playbooks/cluster-baseline.yaml --tags "baseline,install"
#
# Uninstall:
#   ansible-playbook \
#     --extra-vars "iac_inventory_dir=<workdir>" \
#     --extra-vars "@ansible-vars.yaml" \
#     playbooks/cluster-baseline.yaml --tags "baseline,uninstall"
#

# All cluster-baseline tasks run from the Ansible controller (localhost)
# using the kubeconfig generated by the kubernetes-install playbook.
- hosts: localhost
  name: Cluster Baseline - Install essential Kubernetes components
  gather_facts: false
  roles:
    - { role: kubernetes/cluster-baseline }
  tags:
    - baseline
